# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: bazzite-omen-kde
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: testing

modules:

  - type: files
    files:
      - source: system
        destination: /

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.heroicgameslauncher.hgl
          - org.onlyoffice.desktopeditors

  - type: dnf
    install:
      packages:
        - easyeffects
        - git
        - gcc
        - make
        - dkms
        - kernel-devel
        - mc
        - python3-pyqt6
        - python3-pyside6
        - python3-tkinter
        - brave-browser
        - darkly
        - kwin-effects-better-blur-dx

  - type: signing
