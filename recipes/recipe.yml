# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: bazzite-omen-kde
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: testing

modules:

  - type: script
    snippets:
      # Brave repo
      - curl -fsSL https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo \
          -o /etc/yum.repos.d/brave.repo

      - rpm --import https://brave-browser-rpm-release.s3.brave.com/brave-core.asc

      # Darkly repo
      - curl -fsSL https://download.copr.fedorainfracloud.org/results/deltacopy/darkly/deltacopy-darkly.repo \
          -o /etc/yum.repos.d/darkly.repo

      # ❌ WAŻNE: NIE DODAJEMY TEGO:
      # rpm --import https://download.copr.fedorainfracloud.org/results/deltacopy/darkly/pubkey.gpg


  - type: files
    files:
      - source: system
        destination: /

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.heroicgameslauncher.hgl
          - org.onlyoffice.desktopeditors

  - type: dnf
    install:
      packages:
        - easyeffects
        - git
        - gcc
        - make
        - dkms
        - kernel-devel
        - mc
        - python3-pyqt6
        - python3-pyside6
        - python3-tkinter
        - brave-browser
        - darkly

  - type: signing
