name: build-iso

on:
  workflow_dispatch:

jobs:
  iso:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO (BlueBuild)
        uses: blue-build/github-action@v1.11
        with:
          recipe: recipe.yml
          iso: true
          registry_token: ${{ github.token }}

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: iso
          path: "*.iso"
